<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo/style.css">
    <title>Login</title>
</head>
<body>
    <div class="caixa">
        <div class="elementos">

            <h1>Entrar</h1>

            <form action="#" method="post">

                <label for="email">Login</label>
                <input required type="email" name="email" placeholder="seuemail@gmail.com">

                <label for="password">Senha</label>
                <input required type="password" name="password" placeholder="********">

                <p>
                    Esqueceu a senha?
                    <a href="#">Clique aqui!</a>
                </p>

                <button type="submit" id="botao">Fazer login</button>
                
            </form>
        </div>
    </div>
</body>
</html>
